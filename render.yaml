services:
  - type: web
    name: college-erp-system
    env: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker --chdir backend main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: INSFORGE_URL
        sync: false
      - key: INSFORGE_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
