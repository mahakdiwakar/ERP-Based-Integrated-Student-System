<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hostel Portal Login | College ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  
  <style>
    /* =========================================================
       Hostel Login  —  Luxury Black + Gold CSS Style overrides
       ========================================================= */
    :root {
      --bg: #050505;
      --card: #0b0b0b;
      --gold: #D4AF37;
      --gold-light: #F5E6A8;
      --gold-glow: rgba(212, 175, 55, 0.2);
      --border: rgba(212, 175, 55, 0.25);
      --text: #ffffff;
      --muted: #a1a1aa;
      --red: #ef4444;
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body.hl-body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: hidden;
      position: relative;
    }

    /* Particle Background */
    #particleCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Ambient Glow Orbs */
    .hl-orb {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(150px);
      opacity: 0.08;
    }
    .hl-orb-1 {
      top: -150px;
      left: -150px;
      background: radial-gradient(circle, var(--gold), transparent 70%);
    }
    .hl-orb-2 {
      bottom: -150px;
      right: -150px;
      background: radial-gradient(circle, var(--gold), transparent 70%);
    }

    /* Wrapper */
    .hl-wrapper {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    /* Header */
    .hl-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .hl-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .hl-logo svg {
      width: 32px;
      height: 32px;
      filter: drop-shadow(0 0 8px var(--gold-glow));
    }

    .hl-logo span {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .hl-logo span::after {
      content: 'ERP';
      color: var(--gold);
      margin-left: 2px;
    }

    .hl-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.85rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .hl-subtitle {
      color: var(--muted);
      font-size: 0.85rem;
      max-width: 320px;
      margin: 0 auto;
    }

    /* Card */
    .hl-card {
      width: 100%;
      background: rgba(11, 11, 11, 0.9);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px;
      backdrop-filter: blur(20px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 25px rgba(212, 175, 55, 0.08);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .hl-card:hover {
      border-color: rgba(212, 175, 55, 0.5);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 30px rgba(212, 175, 55, 0.15);
    }

    .hl-card-icon {
      font-size: 2.2rem;
      text-align: center;
      margin-bottom: 12px;
      filter: drop-shadow(0 0 8px var(--gold-glow));
    }

    .hl-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      color: var(--gold);
      margin-bottom: 24px;
    }

    /* Form fields */
    .hl-form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .hl-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .hl-input {
      width: 100%;
      height: 48px;
      padding: 0 16px;
      background: #111111;
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: all 0.3s ease;
    }

    .hl-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 10px var(--gold-glow);
      background: #151515;
    }

    .hl-pw-toggle {
      position: absolute;
      right: 14px;
      bottom: 12px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      outline: none;
    }

    .hl-pw-toggle:hover {
      color: var(--gold);
    }

    .hl-form-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      font-size: 0.82rem;
    }

    /* Checkbox styling */
    .hl-checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .hl-checkbox-container input {
      display: none;
    }

    .hl-checkmark {
      width: 16px;
      height: 16px;
      border: 1px solid var(--border);
      border-radius: 4px;
      display: inline-block;
      position: relative;
      background: #111111;
      transition: all 0.2s ease;
    }

    .hl-checkbox-container input:checked + .hl-checkmark {
      background-color: var(--gold);
      border-color: var(--gold);
    }

    .hl-checkbox-container input:checked + .hl-checkmark::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: #050505;
    }

    .hl-forgot {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .hl-forgot:hover {
      color: var(--gold);
    }

    /* Error block */
    .hl-error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--red);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      margin-bottom: 20px;
      display: none;
      text-align: center;
      animation: fadeIn 0.3s ease;
    }

    .hl-error-msg.show {
      display: block;
    }

    /* Buttons */
    .hl-btn {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .hl-btn-gold {
      background: linear-gradient(135deg, var(--gold), #B8962E);
      color: #050505;
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.35);
    }

    .hl-btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(212, 175, 55, 0.55);
    }

    .hl-btn-gold:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner */
    .hl-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #050505;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast Container */
    .hl-toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hl-toast {
      min-width: 280px;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(11, 11, 11, 0.92);
      border: 1px solid var(--border);
      backdrop-filter: blur(15px);
      box-shadow: var(--shadow);
      animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    .hl-toast.success {
      background: rgba(34, 197, 94, 0.15);
      border-color: rgba(34, 197, 94, 0.4);
      color: #22c55e;
    }

    .hl-toast.error {
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.4);
      color: #ef4444;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(40px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes toastOut {
      from { opacity: 1; transform: translateX(0); }
      to { opacity: 0; transform: translateX(40px); }
    }

    /* Forgot Modal Overlay */
    .hl-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }

    .hl-modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .hl-modal {
      background: #0B0B0B;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px 30px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      transform: translateY(-20px);
      transition: all 0.3s ease;
    }

    .hl-modal-overlay.show .hl-modal {
      transform: translateY(0);
    }

    .hl-modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .hl-modal-desc {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .hl-btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .hl-btn-outline:hover {
      border-color: var(--gold);
      color: var(--gold);
      box-shadow: 0 0 10px var(--gold-glow);
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body class="hl-body">

  <!-- Particle Background -->
  <canvas id="particleCanvas"></canvas>

  <!-- Ambient Light Orbs -->
  <div class="hl-orb hl-orb-1"></div>
  <div class="hl-orb hl-orb-2"></div>

  <!-- Toast Container -->
  <div id="toastContainer" class="hl-toast-container"></div>

  <div class="hl-wrapper">
    <!-- Header -->
    <header class="hl-header">
      <div class="hl-logo">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="8" width="40" height="32" rx="4" stroke="#D4AF37" stroke-width="2"/>
          <path d="M12 20h24M12 28h16" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
          <circle cx="36" cy="28" r="4" fill="#D4AF37"/>
        </svg>
        <span>College</span>
      </div>
      <h1 class="hl-title">Hostel Management Portal</h1>
      <p class="hl-subtitle">Secure admin and warden access for resident databases and accommodation</p>
    </header>

    <!-- Centered Card -->
    <main class="hl-card glass" id="wardenCard">
      <div class="hl-card-icon">👮</div>
      <h2>Hostel Portal Login</h2>

      <form id="wardenForm">
        <div class="hl-form-group">
          <label class="hl-label" for="wardenUsername">Username</label>
          <input type="text" id="wardenUsername" class="hl-input" placeholder="e.g. admin" required autocomplete="username">
        </div>

        <div class="hl-form-group">
          <label class="hl-label" for="wardenPassword">Password</label>
          <div style="position: relative;">
            <input type="password" id="wardenPassword" class="hl-input" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="hl-pw-toggle" onclick="togglePassword('wardenPassword', this)" tabIndex="-1">👁</button>
          </div>
        </div>

        <div class="hl-form-row">
          <label class="hl-checkbox-container">
            <input type="checkbox" id="wardenRemember">
            <span class="hl-checkmark"></span>
            Remember me
          </label>
          <a href="#" class="hl-forgot" onclick="return showForgot('warden')">Forgot credentials?</a>
        </div>

        <div id="wardenError" class="hl-error-msg"></div>

        <button type="submit" class="hl-btn hl-btn-gold" id="wardenSubmit">
          <span class="btn-text">Hostel Login</span>
          <div class="btn-loader" style="display: none;">
            <div class="hl-spinner"></div>
            Verifying...
          </div>
        </button>
      </form>
    </main>
  </div>

  <!-- Forgot Credentials Modal -->
  <div id="forgotModal" class="hl-modal-overlay">
    <div class="hl-modal glass">
      <h3 class="hl-modal-title">Reset Portal Access</h3>
      <p id="forgotDesc" class="hl-modal-desc">Contact the system administrator to reset your warden credentials.</p>
      <button class="hl-btn hl-btn-outline" onclick="closeForgot()">Understood</button>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/hostel-login.js"></script>
</body>
</html>
