<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login | College ERP</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/erp.css">
</head>
<body class="erp-body page-transition">
  <div class="erp-wrap erp-login-page">
    <div class="erp-card erp-login-card">
      <h1>Student <span style="color:#D4AF37">Portal</span></h1>
      <p class="sub">Sign in with your enrollment number</p>
      <div class="erp-error" id="error"></div>
      <form id="loginForm">
        <div class="erp-form-group">
          <label>Enrollment Number</label>
          <input type="text" class="erp-input" id="enrollment" placeholder="e.g. AIML2024001" required autocomplete="username">
        </div>
        <div class="erp-form-group">
          <label>Password</label>
          <input type="password" class="erp-input" id="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="erp-btn erp-btn-gold erp-btn-block">Student Login</button>
      </form>
      <a href="index.html" class="erp-back">&larr; Back to Home</a>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const err = document.getElementById('error');
      err.classList.remove('show');
      const enrollment = document.getElementById('enrollment').value;
      const password = document.getElementById('password').value;
      
      try {
        console.log("Login Started");
        console.log("Enrollment:", enrollment);
        
        const data = await AuthAPI.studentLogin(enrollment, password);
        console.log("API Response:", data);
        
        const token = data.accessToken || data.token;
        localStorage.setItem("token", token);
        saveSession(data);
        window.location.href = '/student-dashboard.html';
      } catch (error) {
        console.error(error);
        alert(error.message);
        err.textContent = error.message;
        err.classList.add('show');
      }
    });
  </script>
</body>
</html>
